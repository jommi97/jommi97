<svg xmlns="http://www.w3.org/2000/svg" width="900" height="2" viewBox="0 0 900 2" preserveAspectRatio="none">
  <defs>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="50%" stop-color="#34d399" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
      <animate attributeName="x1" values="-100%;100%" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;200%" dur="3.5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect width="900" height="2" fill="url(#shimmer)"/>
</svg>
